---
en:
  notifications:
    auction_outbid_notification:
      message: You no longer have the high bid on %{name} in the %{auction}
      title: Outbid in Auction
      view_bidding:
        link: View Bidding
    destroy:
      success: Notification was successfully deleted
    future_entry_processing_notification:
      entered_horses:
        one: 1 horse was entered
        other: "%{count} horses were entered"
        zero: No horses were entered
      errored_horses:
        one: 1 horse was skipped due to errors
        other: "%{count} horses were skipped due to errors"
        zero: No horses were skipped due to errors
      message: Automatic entries for %{date} have run. %{entered}, %{skipped}, %{errored}
      skipped_horses:
        one: 1 horse was skipped
        other: "%{count} horses were skipped"
        zero: No horses were skipped
      title: Scheduled Entries
      view_future_entries:
        link: View Details
    horse_born_notification:
      message: The foal for %{sire} x %{dam} was born
      message_created: The created foal was born
      title: 'Foal Birth: %{mare}'
    horse_died_notification:
      message: "%{horse} has died"
      title: Horse Died
    horse_injury_notification:
      injuries:
        bowed_tendon: has a bowed tendon on
        broken_leg: has broken
        cut: has a cut on
        heart_attack: has suffered a heart attack
        heat: has heat on
        limping: is limping on
        overheat: has overheated
        swelling: has swelling in
      message: "%{horse} %{injury}"
      message_with_leg: "%{horse} %{injury} their %{leg} leg"
      title: Injured Horse
    horse_premature_notification:
      message: The foal for %{sire} x %{dam} was born premature
      title: 'Foal Birth: %{mare}'
    horse_retired_notification:
      message: "%{horse} has been retired"
      title: Horse Retired
    horse_stillborn_notification:
      message: The foal for %{sire} x %{dam} was stillborn
      title: 'Stillborn Foal: %{mare}'
    index:
      info: Info
      no_notifications: You have no notifications.
      notification_deletion: Notifications that have been marked read will be automatically deleted after 30 days.
      warning: Attention
    lease_acceptance_notification:
      message: "%{stable} has accepted the lease on %{horse} for %{duration} for %{fee}"
      title: Lease Started
    lease_expiry_notification:
      message: The lease on %{name} has ended.
      title: Lease Ended
    lease_offer_expiry_notification:
      message: 'The lease offer on %{horse} for %{duration} (Fee: %{fee}) has expired.'
      title: Lease Offer Expired
    lease_offer_notification:
      accept_lease:
        confirm: Are you sure you want to accept this lease?
      message: "%{stable} has offered to lease %{horse} to you for %{duration} for %{fee}"
      reject_lease:
        confirm: Are you sure you want to reject this lease?
      title: Horse for Lease
    lease_rejection_notification:
      message: "%{stable} has rejected the lease offer on %{horse} for %{fee}"
      title: Lease Declined
    mare_booking_approval_notification:
      message: "%{stable} has approved a booking to %{stud} for %{mare} (Slot %{start} - %{end})"
      title: Mare Booking Approved
    mare_booking_deletion_notification:
      message: "%{stable} has cancelled a booking to %{stud} for %{mare} (Slot %{start} - %{end})"
      title: Mare Booking Cancelled
    mare_booking_denial_notification:
      message: "%{stable} has declined a booking to %{stud} for %{mare} (Slot %{start} - %{end})"
      title: Mare Booking Declined
    notification:
      default_message: We do not know how to describe what happened.
      status:
        read: read
        unread: unread
      title: Something happened
    sale_acceptance_notification:
      message: "%{stable} has purchased %{horse} for %{price}"
      title: Horse Sold
    sale_offer_expiry_notification:
      message: 'The sale offer on %{horse} (Price: %{price}) has expired.'
      title: Sale Offer Expired
    sale_offer_notification:
      buy_horse:
        confirm: Are you sure you want to buy this horse?
      message: "%{stable} has offered to sell %{horse]} to you for %{price}"
      reject_sale:
        confirm: Are you sure you want to reject this offer?
      title: Horse for Sale
    sale_rejection_notification:
      message: "%{stable} has rejected the sale offer on %{horse} for %{price}"
      title: Sale Declined
    shared:
      view_horse:
        link: View horse
    stud_booking_auto_deleted:
      died: died
      message: "%{sire} has %{event} so your booking for %{mare} has been cancelled"
      open: any mare
      retired: retired from breeding
      title:
        died: Died
        retired: Retired
        text: 'Stud %{event}: %{name}'
    stud_booking_request_cancellation_notification:
      message: "%{stable} has cancelled a requested booking to %{stud} for %{mare} (Slot %{start} - %{end})"
      title: Stud Booking Request Cancelled
    stud_booking_request_notification:
      message: "%{stable} has requested a booking to %{stud} for %{mare} (Slot %{start} - %{end})"
      message_with_comment: "%{stable} has requested a booking to %{stud} for %{mare} (Slot %{start} - %{end}). Their comment: %{comment}"
      title: Stud Booking Request
    stud_breeding_auto_deleted:
      died: died
      message: "%{sire} has %{event} so your breeding for %{mare} has been deleted, this mare is now unbred for %{year}"
      retired: retired from breeding
      title:
        died: Died
        retired: Retired
        text: 'Stud %{event}: %{name}'
    update:
      success: Notification was marked as %{status}
    view_horse: View %{name}
