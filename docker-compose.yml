services:
  app:
    build: .
    container_name: app
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_NAME: final_furlong_development
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    volumes:
      - .:/app
      - ./bundle_cache:/bundle
    ports:
      - 3000:3000
    depends_on:
      - db

  db:
    image: postgres:18
    container_name: postgres
    restart: on-failure:5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: final_furlong_development
    ports:
      - 5432:5433
    volumes:
      - ./tmp/db:/var/lib/postgres/data

